---
layout: default
---
<main
        class="h-screen text-slate-900 bg-gradient-to-t from-slate-300 to-slate-100 dark:from-slate-900 dark:to-slate-800 dark:bg-slate-900 flex flex-col items-center justify-center"
>
    <h1 class="sr-only">{{ site.title }}</h1>
    <div class="flex flex-col items-center w-full max-w-xs p-4 bg-white dark:bg-slate-700 rounded-2xl md:flex-row shadow dark:shadow-slate-600">
        <div class="-mt-28 md:-my-16 md:-ml-32 mb-2 md:mr-2">
            <img class="w-auto h-40 rounded-full dark:grayscale aspect-square" src="https://www.gravatar.com/avatar/{{ site.gravatar }}?s=250&d=mm&r=x" alt="{{ site.title }}">
        </div>
        <div class="flex flex-col space-y-4">
            <div class="flex flex-col items-center md:items-start">
                <h2 class="text-xl font-medium dark:text-slate-100">Júnior Messias</h2>
                <p class="text-base font-medium text-slate-400">{{ site.office }} <a href="{{ site.company_url }}" class="text-blue-500" target="_blank">@{{ site.company }}</a></p>
            </div>
            <div class="flex items-center justify-center space-x-3 md:justify-start">
                <!-- Icons source => https://boxicons.com/ -->
                <a href="https://github.com/{{ site.github_username }}" target="_blank" class="transition-transform transform hover:scale-[1.1]">
                    <span class="sr-only">Github</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8  text-slate-700 dark:text-slate-500" width="40" height="40" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"></path>
                    </svg>
                </a>
                <a href="{{ site.cv_url }}" target="_blank" class="transition-transform transform hover:scale-[1.1]">
                    <span class="sr-only">Curriculum</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-700 dark:text-slate-500" width="40" height="40" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"></path>
                        <path d="M6 21v-2a4 4 0 0 1 4 -4h3.5"></path>
                        <path d="M20 21l2 -2l-2 -2"></path>
                        <path d="M17 17l-2 2l2 2"></path>
                    </svg>
                </a>
                <a href="{{ site.portfolio_url }}" target="_blank" class="transition-transform transform hover:scale-[1.1]">
                    <span class="sr-only">Portfólio</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-700 dark:text-slate-500" width="40" height="40" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M3 19l18 0"></path>
                        <path d="M5 6m0 1a1 1 0 0 1 1 -1h12a1 1 0 0 1 1 1v8a1 1 0 0 1 -1 1h-12a1 1 0 0 1 -1 -1z"></path>
                    </svg>
                </a>
                <div x-data="{ 'showModal': false }">
                    <a href="#" @click="showModal = !showModal" class="">
                        <span class="sr-only">Contato</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-700 dark:text-slate-500 transition-transform transform hover:scale-[1.1]"  width="40" height="40" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                            <path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z"></path>
                            <path d="M3 7l9 6l9 -6"></path>
                        </svg>
                    </a>
                    <!-- Modal -->
                    {% include contact-modal.html %}
                    <!-- Modal -->
                </div>
            </div>
        </div>
    </div>
    <div class="fixed top-5 right-5">
        <button id="theme-toggle" @click="toggleTheme" type="button" class="border-0 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 focus:outline-none rounded-full text-sm p-2 dark:bg-slate-800 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class=" w-5 h-5" viewBox="0 0 20 20" fill="currentColor" x-show="!isDark">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor" x-show="isDark">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
            </svg>
        </button>
    </div>
</main>
